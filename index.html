<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Joseph Anucha">

    <title>Personal Expense Tracker</title>

    <link rel="stylesheet" href="styles/styles.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>

    <h1>Personal Expense Tracker</h1>

    <p>Manage your daily spending with ease.</p>

</header>

<main class="container">

    <!-- Expense Form -->

    <section class="card">

        <h2>Add Expense</h2>

        <div id="messageBox" class="message hidden"></div>
        <form id="expenseForm">

            <div class="form-group">

                <label for="title">Expense</label>

                <input
                    type="text"
                    id="title"
                    placeholder="Groceries"
                    required>

            </div>

            <div class="form-group">

                <label for="amount">Amount</label>

                <input
                    type="number"
                    id="amount"
                    min="0"
                    step="0.01"
                    required>

            </div>

            <div class="form-group">

                <label for="category">Category</label>

                <select id="category">

                    <option>Food</option>
                    <option>Transportation</option>
                    <option>Housing</option>
                    <option>Utilities</option>
                    <option>Entertainment</option>
                    <option>Shopping</option>
                    <option>Healthcare</option>
                    <option>Education</option>
                    <option>Other</option>

                </select>

            </div>

            <div class="form-group">

                <label for="date">Date</label>

                <input
                    type="date"
                    id="date"
                    required>

            </div>

            <button type="submit">

                Add Expense

            </button>

        </form>

    </section>



    <!-- Summary -->

    <section class="summary">

        <article class="summary-card">

            <h3>Total Expenses</h3>

            <p id="expenseCount">0</p>

        </article>

        <article class="summary-card">

            <h3>Total Amount</h3>

            <p id="totalAmount">$0.00</p>

        </article>

        <article class="summary-card">

            <h3>Largest Expense</h3>

            <p id="largestExpense">$0.00</p>

        </article>

    </section>



    <!-- Filter -->

    <section class="card">

        <h2>Filter Expenses</h2>

        <div class="filter-row">

            <select id="filterCategory">

                <option value="all">All Categories</option>

                <option>Food</option>

                <option>Transportation</option>

                <option>Housing</option>

                <option>Utilities</option>

                <option>Entertainment</option>

                <option>Shopping</option>

                <option>Healthcare</option>

                <option>Education</option>

                <option>Other</option>

            </select>

            <select id="sortBy">

                <option value="date">Sort by Date</option>

                <option value="low">Amount Low → High</option>

                <option value="high">Amount High → Low</option>

                <option value="alpha">Alphabetical</option>

            </select>

        </div>

    </section>



    <!-- Expense Table -->

    <section class="card">

        <h2>Expenses</h2>

        <table>

            <thead>

            <tr>

                <th>Date</th>

                <th>Title</th>

                <th>Category</th>

                <th>Amount</th>

                <th>Action</th>

            </tr>

            </thead>

            <tbody id="expenseTable">

            </tbody>

        </table>

    </section>



    <!-- Chart -->

    <section class="card">

        <h2>Expense Breakdown</h2>

        <canvas id="expenseChart"></canvas>

    </section>

</main>

<footer>

    <p>

        CSE 310 JavaScript Module Project

    </p>

</footer>

<script type="module" src="scripts/app.js"></script>

</body>
</html>
